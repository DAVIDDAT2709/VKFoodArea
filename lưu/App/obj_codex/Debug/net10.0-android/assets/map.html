<!DOCTYPE html>
<html>
<head>
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
            background: #f5f5f5;
        }

        #map {
            width: 100vw;
            height: 100vh;
        }

        .leaflet-control-zoom {
            border: none !important;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15) !important;
            border-radius: 14px !important;
            overflow: hidden;
        }

            .leaflet-control-zoom a {
                width: 40px !important;
                height: 40px !important;
                line-height: 40px !important;
                font-size: 22px !important;
                color: #222 !important;
            }

        .map-floating-btn {
            position: absolute;
            right: 14px;
            bottom: 18px;
            z-index: 1000;
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 14px;
            background: white;
            box-shadow: 0 6px 20px rgba(0,0,0,0.18);
            font-size: 18px;
        }

        .leaflet-popup-content-wrapper {
            border-radius: 14px;
        }

        .leaflet-popup-content {
            font-size: 14px;
            margin: 10px 12px;
        }

        .custom-price {
            background: white;
            color: #222;
            border-radius: 18px;
            padding: 6px 10px;
            font-weight: 700;
            font-size: 13px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.15);
            border: none;
            white-space: nowrap;
        }

            .custom-price.dark {
                background: #111;
                color: white;
            }
    </style>
</head>
<body>
    <div id="map"></div>
    <button class="map-floating-btn" onclick="resetView()">⌖</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const spots = [
            { name: "Phố ẩm thực Vĩnh Khánh", lat: 10.76035, lng: 106.70484, price: "$123", dark: true },
            { name: "Quán ốc gợi ý",          lat: 10.75995, lng: 106.70440, price: "$234", dark: false },
            { name: "Món nổi bật",            lat: 10.76070, lng: 106.70515, price: "$299", dark: false },
            { name: "Ốc xào me",              lat: 10.75970, lng: 106.70410, price: "$567", dark: false },
            { name: "Bánh tráng nướng",       lat: 10.75980, lng: 106.70475, price: "$345", dark: false },
            { name: "Hải sản nướng",          lat: 10.76005, lng: 106.70535, price: "$176", dark: false }
        ];

        const bounds = L.latLngBounds(spots.map(x => [x.lat, x.lng]));

        const map = L.map('map', {
            zoomControl: false,
            attributionControl: true,
            dragging: true,
            touchZoom: true,
            doubleClickZoom: true,
            boxZoom: false,
            keyboard: false,
            scrollWheelZoom: true,
            inertia: true,
            zoomSnap: 0.25,
            zoomDelta: 0.5,
            maxZoom: 19,
            minZoom: 15
        });

        L.control.zoom({ position: 'topright' }).addTo(map);

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        map.fitBounds(bounds, {
            padding: [30, 30]
        });

        spots.forEach(s => {
            const cls = s.dark ? 'custom-price dark' : 'custom-price';

            const icon = L.divIcon({
                className: '',
                html: `<div class="${cls}">${s.price}</div>`,
                iconSize: [52, 34],
                iconAnchor: [26, 17]
            });

            L.marker([s.lat, s.lng], { icon })
                .addTo(map)
                .bindPopup(`<b>${s.name}</b><br/>Khu Vĩnh Khánh`);
        });

        function resetView() {
            map.fitBounds(bounds, { padding: [30, 30] });
        }
    </script>
</body>
</html>
